<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>::VØR-EL:: Dashboard Soberano</title>
    <style>
        :root {
            --phi: 1.618;
            --dark: #0a0a0a;
            --gold: #618618; /* Color PHI / Naturaleza */
            --accent: #1a1a1a;
        }
        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Segoe UI', serif;
            margin: 0;
            display: grid;
            grid-template-columns: 1fr calc(100% / var(--phi));
            height: 100vh;
        }
        /* Sección Áurea Izquierda (Panel de Control) */
        .sidebar {
            background-color: var(--accent);
            padding: 2rem;
            border-right: 1px solid var(--gold);
        }
        /* Sección Áurea Derecha (Visualización de Datos) */
        .main-content {
            padding: 2rem;
            overflow-y: auto;
        }
        h1, h2 { color: var(--gold); letter-spacing: 2px; }
        .stat-card {
            background: #111;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--gold);
        }
        .portal-active {
            color: #fff;
            text-shadow: 0 0 10px var(--gold);
        }
        .phi-spiral {
            opacity: 0.1;
            position: fixed;
            bottom: 0; right: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <section class="sidebar">
        <h1>::VØR-EL::</h1>
        <p><strong>Observador:</strong> Cesar Augusto</p>
        <p><strong>Año Personal:</strong> 8 (Poder)</p>
        <hr style="border: 0.5px solid var(--gold)">
        <div class="stat-card">
            <h3>Frecuencia Base</h3>
            <p class="portal-active">432 Hz - Punto Cero</p>
        </div>
        <div class="stat-card">
            <h3>Estado del Sistema</h3>
            <p>Ejecución Perfecta</p>
        </div>
    </section>

    <section class="main-content">
        <h2>Bitácora de Sincronías</h2>
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="text-align: left; border-bottom: 1px solid #333;">
                    <th>Fecha</th>
                    <th>Portal</th>
                    <th>Frecuencia</th>
                </tr>
            </thead>
            <tbody id="log-table">
                <tr>
                    <td>2026-02-28 11:11:00</td>
                    <td>PROTECCIÓN</td>
                    <td>741 Hz</td>
                </tr>
                <tr>
                    <td>2026-02-28 19:30:00</td>
                    <td>MAGNETISMO</td>
                    <td>639 Hz</td>
                </tr>
            </tbody>
        </table>
    </section>

    <div class="phi-spiral">
        <svg width="400" height="400" viewBox="0 0 100 100">
            <path d="M50,50 A50,50 0 0,1 100,100" fill="none" stroke="#618618" stroke-width="0.5"/>
        </svg>
    </div>

</body>
</html>
